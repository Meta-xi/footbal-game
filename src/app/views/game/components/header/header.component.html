<section class="w-full flex flex-col justify-center items-center bg-transparent relative z-10 pt-safe-top px-4">
  <div class="w-full mt-4 liquid-glass-card flex flex-row justify-between items-center py-4 px-5">
    @if (authService.isAuthenticated()) {
    <article class="flex items-center gap-3.5 group cursor-pointer" (click)="toggleLevelMenu()">
      <div
        class="relative w-12 h-12 rounded-full p-[1.5px] bg-gradient-to-tr from-white/30 to-white/5 shadow-lg group-active:scale-95 transition-all">
        <div
          class="w-full h-full rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center overflow-hidden">
          <img ngSrc="header-icons/user.png" alt="user" class="w-7 opacity-90" width="28" height="23">
        </div>
        <!-- Badge de nivel con glow -->
        <div
          class="absolute -bottom-1 -right-1 w-6 h-6 bg-white/10 backdrop-blur-xl border border-white/40 rounded-full flex items-center justify-center text-[11px] font-black text-white shadow-[0_0_10px_rgba(255,255,255,0.3)] text-glow">
          {{ level() }}
        </div>
      </div>
      <div class="flex flex-col">
        <span class="text-[10px] font-bold text-white/40 uppercase tracking-widest leading-none mb-1">Entrenador</span>
        <p class="text-base font-black text-white tracking-tight leading-none text-glow">{{ authService.getUsername() }}
        </p>
      </div>
    </article>
    } @else {
    <article class="flex items-center gap-3.5 group cursor-pointer" (click)="toggleLevelMenu()">
      <div
        class="relative w-12 h-12 rounded-full p-[1.5px] bg-white/10 border border-white/10 backdrop-blur-sm group-active:scale-95 transition-all">
        <div class="w-full h-full rounded-full bg-black/40 flex items-center justify-center overflow-hidden">
          <img ngSrc="header-icons/user.png" alt="user" class="w-7 opacity-40" width="28" height="23">
        </div>
      </div>
      <p class="text-base font-black text-white/60 tracking-tight">Invitado</p>
    </article>
    }

    <div class="flex items-center gap-4">
      <app-per-hour-earnings />
      <div class="modal-context">
        <app-settings [isOpen]="showSettings()" [vibrationEnabled]="vibrationEnabled()" (toggle)="toggleSettings()"
          (close)="closeSettings()" (vibrationChange)="onVibrationChange($event)" />
      </div>
    </div>
  </div>
</section>

<div class="modal-context">
  <app-level-menu [isOpen]="showLevelMenu()" [levelInfo]="levelInfo()" [isAuthenticated]="authService.isAuthenticated()"
    [username]="authService.getUsername()" (close)="closeLevelMenu()" />
</div>
