<section class="flex flex-row justify-between items-center gap-2.5 w-full mb-4 z-20 relative px-0.5">
    <article class="flex-1 liquid-glass-card flex items-center justify-between px-3.5 py-2.5">
        <div class="flex items-center gap-2">
            <div
                class="relative w-7 h-7 rounded-full bg-white/5 flex items-center justify-center border border-white/10 shadow-inner">
                <img ngSrc="energy/thunder.png" alt="energy icon" class="w-4 h-4 object-contain opacity-80" width="32"
                    height="19">
            </div>
            <div class="flex flex-col">
                <span
                    class="text-[8px] font-black text-white/30 uppercase tracking-widest leading-none mb-0.5">Energía</span>
                <p class="text-[13px] font-black text-white tracking-tight leading-none text-glow">
                    {{ energy() }}<span class="text-[10px] text-white/40 font-bold ml-1">/ {{ maxEnergy() }}</span>
                </p>
            </div>
        </div>
    </article>

    <button type="button" (click)="goToBoost()"
        class="liquid-glass-button px-5 py-2.5 flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10"
        aria-label="Ir a impulsos">
        <img ngSrc="energy/rocket.png" alt="rocket icon"
            class="w-4 h-4 opacity-80 group-hover:opacity-100 transition-all" width="24" height="24">
        <span class="text-[11px] font-black tracking-tight">Boost</span>
    </button>
</section>
