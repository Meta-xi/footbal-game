<section class="rank-list" aria-label="Lista de calificaciones">
  <div class="rank-list__header">
    <h2 class="rank-list__title">{{ title() }}</h2>
    <span class="rank-list__score">Puntuación</span>
  </div>
  <div class="rank-list__rows">
    @if (entries().length === 0) {
    <p class="rank-list__empty">Sin usuarios por ahora.</p>
    } @else {
      @for (entry of entries(); track entry.id) {
      <div class="rank-list__row">
        <div class="rank-list__position">{{ entry.position }}</div>
        <div class="rank-list__user">
          <div class="rank-list__avatar">
            <img [ngSrc]="entry.avatar" [alt]="entry.name" width="40" height="40">
          </div>
          <div class="rank-list__name">{{ entry.name }}</div>
        </div>
        <div class="rank-list__value">{{ entry.score }}</div>
      </div>
      }
    }
  </div>
</section>
