<div #floatingNumbersContainer class="floating-numbers-container pointer-events-none">
  @for (floatingNumber of floatingNumbers(); track trackByFloatingNumber($index, floatingNumber)) {
  <div class="floating-number font-black text-white text-2xl drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
    [style.left.px]="floatingNumber.x" [style.top.px]="floatingNumber.y">
    +{{ floatingNumber.value }}
  </div>
  }
</div>
<div class="game-container bg-transparent flex flex-col items-center justify-center relative w-full h-full">
  @if (noEnergyMessage()) {
  <div
    class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 px-6 py-3 bg-red-500/20 backdrop-blur-xl border border-red-500/40 rounded-2xl text-white font-bold text-sm shadow-2xl z-[100] animate-bounce">
    {{ noEnergyMessage() }}
  </div>
  }

  <div class="fixed top-[45%] left-4 flex flex-col items-center gap-3 z-50">
    <button
      class="w-10 h-10 rounded-full bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg flex items-center justify-center transition-all hover:bg-white/10 active:scale-90 group"
      (click)="openRank($event)" aria-label="Información">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
        class="w-5 h-5 text-white/70 group-hover:text-white transition-colors">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
      </svg>
    </button>
    <div
      class="px-2.5 py-1 bg-black/20 backdrop-blur-md border border-white/5 rounded-lg text-white/40 text-[9px] font-black tracking-tighter uppercase">
      Rank
    </div>
  </div>

  <button
    class="fixed top-[45%] right-4 w-10 h-10 rounded-full bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg flex items-center justify-center transition-all hover:bg-white/10 active:scale-90 z-50 group"
    (click)="openLuckyWheel($event)" aria-label="Ruleta de la suerte">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
      class="w-5 h-5 text-amber-400 group-hover:scale-110 transition-transform">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
    </svg>
  </button>

  <div class="tap-ball-container relative group cursor-pointer" (click)="tap($event)">
    <!-- Decorative ring around the ball -->
    <div
      class="absolute inset-[-10%] rounded-full bg-gradient-to-tr from-white/10 to-transparent blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500">
    </div>
    <img #ballImage [ngSrc]="ballImageSrc()" alt="tap-coin"
      class="mx-auto w-[280px] h-[280px] object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] active:scale-90 transition-transform duration-100"
      width="280" height="280" priority>
  </div>
</div>
