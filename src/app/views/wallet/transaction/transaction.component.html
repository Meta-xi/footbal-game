<section class="page-container">
  @if (isDeposit()) {
    <app-deposit-form
      [currency]="currency()!"
      [network]="network()"
    />
  } @else if (isWithdraw()) {
    <app-withdraw-form
      [currency]="currency()!"
      [network]="network()"
    />
  } @else {
    <div class="error-container">
      <h2>Tipo de transacción inválido</h2>
      <p>Por favor, selecciona un tipo de transacción válido.</p>
    </div>
  }
</section>
